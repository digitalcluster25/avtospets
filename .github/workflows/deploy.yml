name: Deploy frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.VPS_PORT || 22 }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_USER: ${{ secrets.VPS_USER }}
          APP_DIR: ${{ secrets.APP_DIR || '/opt/avtospets' }}
          REPO_URL: ${{ secrets.REPO_URL || 'https://github.com/digitalcluster25/avtospets.git' }}
          BRANCH: ${{ github.ref_name }}
          ENV_FILE: ${{ secrets.ENV_FILE || '/opt/avtospets/.env.production' }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "export APP_DIR='$APP_DIR' REPO_URL='$REPO_URL' BRANCH='$BRANCH' ENV_FILE='$ENV_FILE'; bash -s" \
            < ops/deploy.sh

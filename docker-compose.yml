services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN}
        WORDPRESS_GRAPHQL_ENDPOINT: ${WORDPRESS_GRAPHQL_ENDPOINT}
        WORDPRESS_REVALIDATE_SECRET: ${WORDPRESS_REVALIDATE_SECRET}
        CONTACT_WEBHOOK_URL: ${CONTACT_WEBHOOK_URL}
    container_name: avtospets-frontend
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      traefik.enable: "true"
      traefik.http.routers.avtospets.entrypoints: "${TRAEFIK_ENTRYPOINTS:-websecure}"
      traefik.http.routers.avtospets.rule: "Host(`${APP_HOST:-avtospets.spaces.community}`)"
      traefik.http.routers.avtospets.tls: "true"
      traefik.http.routers.avtospets.tls.certresolver: "${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      traefik.http.services.avtospets.loadbalancer.server.port: "3000"
